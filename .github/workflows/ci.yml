name: WebPulse CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m py_compile backend/app.py agents/playwright_bot.py scheduler/dispatcher.py websocket/manager.py
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: npm install
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
